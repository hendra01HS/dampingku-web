<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — DampingKu</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root { --hijau:#2A9D8F; --navy:#1D3557; --krem:#FFF8F0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Nunito',sans-serif;
      background:linear-gradient(135deg, var(--navy) 0%, #2E4A6E 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .card {
      background:white; border-radius:20px; padding:40px;
      width:100%; max-width:400px;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align:center; margin-bottom:28px; }
    .logo-icon {
      width:56px; height:56px;
      background:linear-gradient(135deg, var(--hijau), #1A7268);
      border-radius:14px; display:flex; align-items:center;
      justify-content:center; font-size:24px; margin:0 auto 10px;
    }
    .logo h1 { font-size:1.6rem; font-weight:900; color:var(--navy); }
    .logo h1 span { color:var(--hijau); }
    .logo p { font-size:0.85rem; color:#6B7280; margin-top:4px; }
    .form-group { margin-bottom:16px; }
    label { display:block; font-weight:700; font-size:0.88rem; color:var(--navy); margin-bottom:6px; }
    input {
      width:100%; padding:12px 16px; border-radius:10px;
      border:2px solid #e5e7eb; font-family:'Nunito',sans-serif;
      font-size:0.95rem; outline:none; transition:border 0.2s;
    }
    input:focus { border-color:var(--hijau); }
    .btn-login {
      width:100%; padding:14px; background:var(--hijau); color:white;
      border:none; border-radius:12px; font-family:'Nunito',sans-serif;
      font-size:1rem; font-weight:800; cursor:pointer; margin-top:8px;
      transition:background 0.2s;
    }
    .btn-login:hover { background:#1A7268; }
    .btn-login:disabled { background:#9CA3AF; cursor:not-allowed; }
    .error-msg {
      background:#FEF2F2; border:1px solid #FECACA; color:#DC2626;
      padding:12px 16px; border-radius:10px; font-size:0.88rem;
      margin-top:16px; display:none;
    }
    .back-link { text-align:center; margin-top:20px; }
    .back-link a { color:var(--hijau); font-weight:700; text-decoration:none; font-size:0.88rem; }
    .hint { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:10px; padding:12px 16px; margin-bottom:20px; font-size:0.82rem; color:#166534; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <h1>Damping<span>Ku</span></h1>
    <p>Panel Admin — Login untuk melanjutkan</p>
  </div>
  <div class="hint">
    🔐 Gunakan email & password yang sudah didaftarkan di Firebase Authentication.
  </div>
  <div class="form-group">
    <label>Email Admin</label>
    <input type="email" id="email" placeholder="admin@dampingku.id"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>
  <button class="btn-login" id="btn-login" onclick="login()">🔓 Masuk ke Panel Admin</button>
  <div class="error-msg" id="error-msg"></div>
  <div class="back-link"><a href="../index.html">← Kembali ke Website</a></div>
</div>

<script type="module">
  import { auth, signInWithEmailAndPassword, onAuthStateChanged } from '../js/firebase-config.js';

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });

  window.login = async () => {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error-msg');
    if (!email || !pass) { showErr('Email dan password harus diisi.'); return; }
    btn.disabled = true; btn.textContent = '⏳ Memeriksa...';
    err.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = 'dashboard.html';
    } catch (e) {
      let msg = 'Login gagal. Periksa email dan password.';
      if (e.code === 'auth/user-not-found') msg = 'Email tidak terdaftar.';
      if (e.code === 'auth/wrong-password') msg = 'Password salah.';
      if (e.code === 'auth/too-many-requests') msg = 'Terlalu banyak percobaan. Coba lagi nanti.';
      showErr(msg);
    } finally {
      btn.disabled = false; btn.textContent = '🔓 Masuk ke Panel Admin';
    }
  };

  function showErr(msg) {
    const e = document.getElementById('error-msg');
    e.textContent = '❌ ' + msg; e.style.display = 'block';
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') window.login(); });
</script>
</body>
</html>
